@let currentCard = card();

<article
  class="flex h-full min-h-36 flex-col justify-between rounded-lg border border-slate-200/80 px-4 py-3 shadow-[0_1px_2px_rgba(15,23,42,0.04)]"
  [class.bg-[#879fff]]="currentCard.featured"
  [class.border-transparent]="currentCard.featured"
  [class.text-white]="currentCard.featured"
  [class.bg-white]="!currentCard.featured"
  [class.text-slate-900]="!currentCard.featured"
>
  <div class="flex items-start justify-between gap-4">
    <div class="space-y-1.5">
      <div class="flex items-center gap-2">
        @if (currentCard.featured) {
          <span class="text-sm leading-5 text-white">✓</span>
        }
        <h3 class="text-sm font-medium leading-5">{{ currentCard.tier }}</h3>
      </div>

      <p
        class="max-w-[18rem] text-[11px] leading-[18px]"
        [class.text-white/80]="currentCard.featured"
        [class.text-slate-500]="!currentCard.featured"
      >
        {{ currentCard.summary }}
      </p>
    </div>

    <div class="text-right">
      <p class="text-2xl leading-6">{{ currentCard.total }}</p>
      <p class="text-2xl leading-6">bonuses</p>
    </div>
  </div>

  <div class="flex items-end justify-between gap-4">
    <button
      type="button"
      class="rounded-full border px-3 py-1.5 text-[11px] leading-[18px] transition-colors"
      [class.border-white/20]="currentCard.featured"
      [class.bg-white/20]="currentCard.featured"
      [class.text-white]="currentCard.featured"
      [class.border-slate-200]="!currentCard.featured"
      [class.bg-white]="!currentCard.featured"
      [class.text-[#879fff]]="!currentCard.featured"
    >
      {{ currentCard.cta }}
    </button>

    <p
      class="max-w-[8rem] text-right text-xs leading-[18px]"
      [class.text-white/90]="currentCard.featured"
      [class.text-slate-700]="!currentCard.featured"
    >
      {{ currentCard.footnote }}
    </p>
  </div>
</article>
